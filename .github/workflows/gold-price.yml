name: Update Gold Price

on:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST
    - cron: '30 9 * * *'   # 3:00 PM IST
    - cron: '30 15 * * *'  # 9:00 PM IST
  workflow_dispatch:

jobs:
  update-gold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch gold price and write gold.json
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, math, subprocess
          from datetime import datetime, timezone, timedelta

          IST = timezone(timedelta(hours=5, minutes=30))
          now = datetime.now(IST)
          date_str = now.strftime("%-d %b %Y, %I:%M %p IST")
          today = now.strftime("%Y-%m-%d")

          price_per_gram = None

          # Try 1: dated fawazahmed0 CDN URL
          urls = [
            f"https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@{today}/v1/currencies/xau.json",
            "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/xau.json",
          ]
          for url in urls:
            try:
              with urllib.request.urlopen(url, timeout=10) as r:
                d = json.loads(r.read())
                inr_per_oz = d["xau"]["inr"]
                # International spot per gram
                spot = inr_per_oz / 31.1035
                # Apply India premium: 15% import duty + 3% GST + ~2% misc = ~20.6%
                price_per_gram = round(spot * 1.206, 2)
                print(f"Spot: ₹{spot:.2f}/g → with India duty+GST: ₹{price_per_gram}/g")
                break
            except Exception as e:
              print(f"Failed {url}: {e}")
              continue

          if not price_per_gram or price_per_gram < 10000:
            print("All APIs failed or price implausible — skipping update")
            exit(0)

          grams = 20
          value = round(price_per_gram * grams)
          out = {"price": price_per_gram, "date": date_str, "grams": grams, "value": value}
          with open("gold.json", "w") as f:
            json.dump(out, f)
          print(f"Written: {out}")
          PYEOF

      - name: Commit gold.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gold.json
          git diff --staged --quiet || git commit -m "chore: gold price update — $(TZ='Asia/Kolkata' date +'%d %b %Y %I:%M %p IST')"
          git push
