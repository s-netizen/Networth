<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net Worth · Sanchit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --surface2: #f2f1ee;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.15);
    --text: #1a1916;
    --text-2: #6b6961;
    --text-3: #a09d97;
    --accent: #1a1916;
    --gold: #c4922a;
    --green: #2d7a4f;
    --red: #c0392b;
    --blue: #2563a8;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* Layout */
  .shell { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Header */
  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2.5rem; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 13px; letter-spacing: 0.08em; color: var(--text-2); text-transform: uppercase; margin-bottom: 6px; }
  .total-value { font-family: 'DM Serif Display', serif; font-size: 48px; color: var(--text); line-height: 1; }
  .total-sub { font-size: 13px; color: var(--text-3); margin-top: 6px; }
  .header-actions { display: flex; gap: 8px; padding-top: 4px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-primary:hover { background: #333; }
  .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* Gold banner */
  .gold-banner { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fffbf0; border: 1px solid #e8d5a0; border-radius: var(--radius-sm); margin-bottom: 1.5rem; font-size: 13px; }
  .gold-banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .gold-banner span { color: var(--text-2); }
  .gold-banner strong { color: var(--text); }
  .gold-banner .refresh-btn { margin-left: auto; border: none; background: none; cursor: pointer; color: var(--gold); font-size: 13px; font-family: 'DM Sans', sans-serif; text-decoration: underline; text-underline-offset: 2px; }

  /* Cards grid */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .asset-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; }
  .asset-card:hover { border-color: var(--border-strong); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .asset-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--card-accent, transparent); }
  .card-icon { font-size: 20px; margin-bottom: 10px; }
  .card-label { font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
  .card-value { font-size: 18px; font-weight: 500; color: var(--text); }
  .card-pct { font-size: 12px; color: var(--text-3); margin-top: 3px; }
  .card-edit-hint { position: absolute; bottom: 10px; right: 12px; font-size: 11px; color: var(--text-3); opacity: 0; transition: opacity 0.15s; }
  .asset-card:hover .card-edit-hint { opacity: 1; }

  /* Section */
  .section { margin-bottom: 2rem; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.06em; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }

  /* Charts row */
  .charts-row { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: start; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .donut-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto 16px; }
  .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .donut-center-val { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); }
  .donut-center-label { font-size: 10px; color: var(--text-3); margin-top: 2px; }
  .legend-list { display: flex; flex-direction: column; gap: 7px; }
  .leg-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .leg-name { color: var(--text-2); flex: 1; }
  .leg-amt { font-weight: 500; color: var(--text); font-size: 12px; }
  .leg-pct { font-size: 11px; color: var(--text-3); min-width: 32px; text-align: right; }

  /* History chart */
  .history-canvas-wrap { position: relative; width: 100%; height: 260px; }

  /* History table */
  .history-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); font-weight: 500; padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  td { padding: 10px 10px; border-bottom: 1px solid var(--border); color: var(--text-2); vertical-align: middle; }
  td:first-child, th:first-child { color: var(--text); font-weight: 500; }
  td:last-child { text-align: right; }
  .change-pos { color: var(--green); }
  .change-neg { color: var(--red); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 16px; padding: 2px 4px; transition: color 0.15s; }
  .del-btn:hover { color: var(--red); }
  tr:hover td { background: var(--surface2); }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 360px; max-width: 94vw; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 1.25rem; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-row input, .form-row select { width: 100%; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-row input:focus, .form-row select:focus { border-color: var(--text); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .modal-note { font-size: 12px; color: var(--text-3); margin-top: 8px; }

  /* History modal grid */
  .history-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Tabs */
  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
  .tab { padding: 8px 14px; font-size: 13px; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: 'DM Sans', sans-serif; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Animations */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .asset-card { animation: fadeUp 0.3s ease both; }

  /* Empty state */
  .empty { padding: 2rem; text-align: center; color: var(--text-3); font-size: 14px; }

  /* Responsive */
  @media (max-width: 640px) {
    .charts-row { grid-template-columns: 1fr; }
    .total-value { font-size: 36px; }
    .page-header { flex-direction: column; gap: 1rem; }
    .history-fields { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="page-header">
    <div>
      <p class="page-title">Net Worth Dashboard</p>
      <p class="total-value" id="totalDisplay">₹0</p>
      <p class="total-sub" id="totalSub">Loading…</p>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="openSnapshotModal()">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
        Save snapshot
      </button>
      <button class="btn btn-primary" onclick="openHistoryEntryModal()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Add history
      </button>
    </div>
  </div>

  <!-- Gold price banner -->
  <div class="gold-banner" id="goldBanner">
    <span class="dot"></span>
    <span id="goldStatus">Fetching live gold price…</span>
    <button class="refresh-btn" onclick="fetchGold()">Refresh</button>
  </div>

  <!-- Asset cards -->
  <div class="cards-grid" id="cardGrid"></div>

  <hr class="divider">

  <!-- Allocation section -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Allocation</span>
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="donut-wrap">
          <canvas id="donutChart" role="img" aria-label="Portfolio allocation donut chart"></canvas>
          <div class="donut-center">
            <span class="donut-center-val" id="donutCenter">7</span>
            <span class="donut-center-label">assets</span>
          </div>
        </div>
        <div class="legend-list" id="legendList"></div>
      </div>
      <div class="chart-card">
        <div class="section-header" style="margin-bottom:10px;">
          <span class="section-title">Net worth over time</span>
        </div>
        <div class="history-canvas-wrap">
          <canvas id="historyChart" role="img" aria-label="Net worth history line chart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- History section -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">History</span>
      <button class="btn" onclick="openHistoryEntryModal()">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add entry
      </button>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('table')">Table</button>
      <button class="tab" onclick="switchTab('breakdown')">Monthly breakdown</button>
    </div>
    <div class="tab-panel active" id="tab-table">
      <div class="history-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Month</th>
              <th>Total</th>
              <th>Equity</th>
              <th>RSU</th>
              <th>Gold</th>
              <th>Retirement</th>
              <th>Change</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </div>
    </div>
    <div class="tab-panel" id="tab-breakdown">
      <div style="position:relative;width:100%;height:300px;">
        <canvas id="breakdownChart" role="img" aria-label="Monthly stacked asset breakdown"></canvas>
      </div>
    </div>
  </div>

  <p style="font-size:12px;color:var(--text-3);text-align:right;margin-top:1rem;" id="lastSaved"></p>
</div>

<!-- Edit asset modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <p class="modal-title" id="editTitle">Edit asset</p>
    <div class="form-row">
      <label id="editLabel">Value (₹)</label>
      <input type="number" id="editInput" placeholder="0">
    </div>
    <p class="modal-note" id="editNote"></p>
    <div class="modal-btns">
      <button class="btn" onclick="closeEdit()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- History entry modal -->
<div class="overlay" id="historyOverlay">
  <div class="modal" style="width:440px;">
    <p class="modal-title">Add historical entry</p>
    <div class="form-row">
      <label>Month</label>
      <input type="month" id="h_month">
    </div>
    <div class="history-fields">
      <div class="form-row">
        <label>Stocks / MF / ETF (₹)</label>
        <input type="number" id="h_equity" placeholder="0">
      </div>
      <div class="form-row">
        <label>Akamai RSU (₹)</label>
        <input type="number" id="h_rsu" placeholder="0">
      </div>
      <div class="form-row">
        <label>Unlisted / Crowdcube (₹)</label>
        <input type="number" id="h_unlisted" placeholder="0">
      </div>
      <div class="form-row">
        <label>Gold (₹)</label>
        <input type="number" id="h_gold" placeholder="0">
      </div>
      <div class="form-row">
        <label>PPF (₹)</label>
        <input type="number" id="h_ppf" placeholder="0">
      </div>
      <div class="form-row">
        <label>PF (₹)</label>
        <input type="number" id="h_pf" placeholder="0">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeHistory()">Cancel</button>
      <button class="btn btn-primary" onclick="saveHistoryEntry()">Add entry</button>
    </div>
  </div>
</div>

<!-- Snapshot modal -->
<div class="overlay" id="snapshotOverlay">
  <div class="modal">
    <p class="modal-title">Save snapshot</p>
    <p style="font-size:14px;color:var(--text-2);margin-bottom:1rem;">This will save today's values as a history entry for <strong id="snapshotMonth"></strong>.</p>
    <div class="modal-btns">
      <button class="btn" onclick="closeSnapshot()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmSnapshot()">Save snapshot</button>
    </div>
  </div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────

const DEFAULT_ASSETS = [
  { id:'equity',   label:'Stocks / MF / ETF',  emoji:'📈', value:1567313.50, color:'#2563a8', goldLinked:false },
  { id:'rsu',      label:'Akamai RSU',          emoji:'🏢', value:554053.06,  color:'#1d7a5a', goldLinked:false },
  { id:'unlisted', label:'Precize Unlisted',    emoji:'🔒', value:34537.65,   color:'#7c6fd4', goldLinked:false },
  { id:'crowdcube',label:'Crowdcube',           emoji:'🌍', value:28000,      color:'#c05a2a', goldLinked:false },
  { id:'gold',     label:'Gold (20g)',           emoji:'✦',  value:291940,     color:'#c4922a', goldLinked:true, grams:20 },
  { id:'ppf',      label:'PPF',                 emoji:'🛡', value:258720,     color:'#3a8c50', goldLinked:false },
  { id:'pf',       label:'PF',                  emoji:'🐖', value:345370,     color:'#6b6961', goldLinked:false },
];

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

let assets = load('nw_assets', DEFAULT_ASSETS.map(a => ({...a})));
let history = load('nw_history', []);
let goldPricePerGram = null;
let editingId = null;
let donutChart = null, historyChart = null, breakdownChart = null;

// ─── Formatting ──────────────────────────────────────────────────────────────

function fmt(v) {
  if (v >= 1e7) return '₹' + (v/1e7).toFixed(2) + ' Cr';
  if (v >= 1e5) return '₹' + (v/1e5).toFixed(2) + 'L';
  return '₹' + Math.round(v).toLocaleString('en-IN');
}
function fmtShort(v) {
  if (v >= 1e7) return '₹' + (v/1e7).toFixed(1) + 'Cr';
  if (v >= 1e5) return '₹' + (v/1e5).toFixed(1) + 'L';
  return '₹' + Math.round(v/1000) + 'k';
}
function getTotal() { return assets.reduce((s,a) => s+a.value, 0); }

// ─── Gold price ──────────────────────────────────────────────────────────────

async function fetchGold() {
  const banner = document.getElementById('goldStatus');
  banner.textContent = 'Fetching live gold price…';
  try {
    // Use a CORS-friendly open API for gold price in INR
    const res = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/xau.json');
    const data = await res.json();
    const inrPerTroyOz = data.xau.inr;
    // 1 troy oz = 31.1035g
    goldPricePerGram = inrPerTroyOz / 31.1035;
    const goldAsset = assets.find(a => a.id === 'gold');
    if (goldAsset) {
      goldAsset.value = Math.round(goldPricePerGram * goldAsset.grams);
      save('nw_assets', assets);
    }
    banner.innerHTML = `<strong>Gold:</strong> ₹${Math.round(goldPricePerGram).toLocaleString('en-IN')}/g · 20g = ${fmt(goldAsset.value)} <span style="color:var(--gold);font-size:11px;">● live</span>`;
    renderAll();
  } catch(e) {
    banner.textContent = 'Could not fetch live gold price. Using stored value.';
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────

function renderCards() {
  const total = getTotal();
  document.getElementById('totalDisplay').textContent = fmt(total);
  document.getElementById('totalSub').textContent =
    'Across ' + assets.length + ' assets · click any card to edit';

  const grid = document.getElementById('cardGrid');
  grid.innerHTML = assets.map((a, i) => {
    const pct = ((a.value/total)*100).toFixed(1);
    return `<div class="asset-card" style="--card-accent:${a.color}; animation-delay:${i*40}ms" onclick="openEdit('${a.id}')">
      <div class="card-icon">${a.emoji}</div>
      <div class="card-label">${a.label}</div>
      <div class="card-value">${fmt(a.value)}</div>
      <div class="card-pct">${pct}% of total${a.goldLinked ? ' · auto' : ''}</div>
      <span class="card-edit-hint">click to edit →</span>
    </div>`;
  }).join('');
}

function renderDonut() {
  const total = getTotal();
  const ctx = document.getElementById('donutChart');
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: assets.map(a => a.label),
      datasets: [{ data: assets.map(a => a.value), backgroundColor: assets.map(a => a.color), borderWidth: 3, borderColor: '#ffffff', hoverOffset: 6 }]
    },
    options: {
      cutout: '70%', responsive: true, maintainAspectRatio: true,
      plugins: { legend: { display:false }, tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.raw) + ' (' + ((ctx.raw/total)*100).toFixed(1) + '%)' } } }
    }
  });
  document.getElementById('donutCenter').textContent = assets.length;
  const legend = document.getElementById('legendList');
  legend.innerHTML = assets.map(a => {
    const pct = ((a.value/total)*100).toFixed(1);
    return `<div class="leg-row">
      <span class="leg-dot" style="background:${a.color}"></span>
      <span class="leg-name">${a.label}</span>
      <span class="leg-amt">${fmtShort(a.value)}</span>
      <span class="leg-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function renderHistoryChart() {
  const ctx = document.getElementById('historyChart');
  if (historyChart) historyChart.destroy();
  const sorted = [...history].sort((a,b) => a.month.localeCompare(b.month));
  if (sorted.length < 2) {
    ctx.parentElement.innerHTML = '<div class="empty">Add at least 2 history entries to see the trend.</div>';
    return;
  }
  const labels = sorted.map(h => {
    const [y, m] = h.month.split('-');
    return new Date(y, m-1).toLocaleString('en-IN', {month:'short', year:'2-digit'});
  });
  const values = sorted.map(h => h.total);
  historyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Net worth',
        data: values,
        borderColor: '#1a1916',
        backgroundColor: 'rgba(26,25,22,0.05)',
        fill: true,
        tension: 0.35,
        pointRadius: 4,
        pointBackgroundColor: '#1a1916',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display:false }, tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.raw) } } },
      scales: {
        x: { grid: { display:false }, ticks: { font: { size:11 }, color:'#a09d97' } },
        y: { grid: { color:'rgba(0,0,0,0.05)' }, ticks: { font:{size:11}, color:'#a09d97', callback: v => fmtShort(v) } }
      }
    }
  });
}

function renderBreakdownChart() {
  const ctx = document.getElementById('breakdownChart');
  if (breakdownChart) breakdownChart.destroy();
  const sorted = [...history].sort((a,b) => a.month.localeCompare(b.month));
  if (sorted.length === 0) return;
  const labels = sorted.map(h => {
    const [y, m] = h.month.split('-');
    return new Date(y, m-1).toLocaleString('en-IN', {month:'short', year:'2-digit'});
  });
  const CATS = [
    { key:'equity',    label:'Equity',    color:'#2563a8' },
    { key:'rsu',       label:'RSU',       color:'#1d7a5a' },
    { key:'unlisted',  label:'Unlisted',  color:'#7c6fd4' },
    { key:'gold',      label:'Gold',      color:'#c4922a' },
    { key:'retirement',label:'Retirement',color:'#3a8c50' },
  ];
  breakdownChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: CATS.map(c => ({
        label: c.label,
        data: sorted.map(h => h[c.key] || 0),
        backgroundColor: c.color,
        stack: 'stack',
        borderWidth: 0,
        borderRadius: 2,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display:true, labels: { font:{size:11}, color:'#6b6961', boxWidth:10, boxHeight:10, padding:12 } }, tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.raw) } } },
      scales: {
        x: { stacked:true, grid:{display:false}, ticks:{font:{size:11},color:'#a09d97'} },
        y: { stacked:true, grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:{size:11},color:'#a09d97', callback: v => fmtShort(v)} }
      }
    }
  });
}

function renderHistoryTable() {
  const sorted = [...history].sort((a,b) => b.month.localeCompare(a.month));
  const tbody = document.getElementById('historyTableBody');
  if (sorted.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-3);padding:2rem;">No history yet. Add entries to track your journey.</td></tr>';
    return;
  }
  tbody.innerHTML = sorted.map((h, i) => {
    const prev = sorted[i+1];
    const change = prev ? h.total - prev.total : null;
    const changeFmt = change !== null
      ? `<span class="${change>=0?'change-pos':'change-neg'}">${change>=0?'+':''}${fmtShort(change)}</span>`
      : '—';
    const [y, m] = h.month.split('-');
    const label = new Date(y, m-1).toLocaleString('en-IN', {month:'long', year:'numeric'});
    return `<tr>
      <td>${label}</td>
      <td>${fmt(h.total)}</td>
      <td>${h.equity ? fmtShort(h.equity) : '—'}</td>
      <td>${h.rsu ? fmtShort(h.rsu) : '—'}</td>
      <td>${h.gold ? fmtShort(h.gold) : '—'}</td>
      <td>${h.retirement ? fmtShort(h.retirement) : '—'}</td>
      <td>${changeFmt}</td>
      <td><button class="del-btn" onclick="deleteHistory('${h.month}')" title="Delete">✕</button></td>
    </tr>`;
  }).join('');
}

function renderAll() {
  renderCards();
  renderDonut();
  renderHistoryChart();
  renderBreakdownChart();
  renderHistoryTable();
  const now = new Date();
  document.getElementById('lastSaved').textContent =
    'Last updated ' + now.toLocaleString('en-IN', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ─── Edit modal ───────────────────────────────────────────────────────────────

function openEdit(id) {
  const a = assets.find(x => x.id === id);
  editingId = id;
  document.getElementById('editTitle').textContent = a.label;
  document.getElementById('editLabel').textContent = 'Value (₹) — currently ' + fmt(a.value);
  document.getElementById('editInput').value = Math.round(a.value);
  document.getElementById('editNote').textContent = a.goldLinked ? '⚠ Gold value auto-updates when you refresh live price.' : '';
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(() => document.getElementById('editInput').select(), 50);
}
function closeEdit() { document.getElementById('editOverlay').classList.remove('open'); editingId = null; }
function saveEdit() {
  const v = parseFloat(document.getElementById('editInput').value);
  if (isNaN(v) || v < 0) return;
  assets.find(x => x.id === editingId).value = v;
  save('nw_assets', assets);
  closeEdit(); renderAll();
}

// ─── History modal ────────────────────────────────────────────────────────────

function openHistoryEntryModal() {
  const now = new Date();
  document.getElementById('h_month').value = now.toISOString().slice(0,7);
  ['equity','rsu','unlisted','gold','ppf','pf'].forEach(id => {
    const a = assets.find(x => x.id === id);
    document.getElementById('h_' + id).value = a ? Math.round(a.value) : '';
  });
  document.getElementById('historyOverlay').classList.add('open');
}
function closeHistory() { document.getElementById('historyOverlay').classList.remove('open'); }
function saveHistoryEntry() {
  const month = document.getElementById('h_month').value;
  if (!month) return;
  const equity = parseFloat(document.getElementById('h_equity').value)||0;
  const rsu = parseFloat(document.getElementById('h_rsu').value)||0;
  const unlisted = parseFloat(document.getElementById('h_unlisted').value)||0;
  const gold = parseFloat(document.getElementById('h_gold').value)||0;
  const ppf = parseFloat(document.getElementById('h_ppf').value)||0;
  const pf = parseFloat(document.getElementById('h_pf').value)||0;
  const retirement = ppf + pf;
  const total = equity + rsu + unlisted + gold + ppf + pf;
  const existing = history.findIndex(h => h.month === month);
  const entry = { month, total, equity, rsu, unlisted, gold, retirement, ppf, pf };
  if (existing >= 0) history[existing] = entry; else history.push(entry);
  save('nw_history', history);
  closeHistory(); renderAll();
}
function deleteHistory(month) {
  if (!confirm('Delete entry for ' + month + '?')) return;
  history = history.filter(h => h.month !== month);
  save('nw_history', history); renderAll();
}

// ─── Snapshot modal ───────────────────────────────────────────────────────────

function openSnapshotModal() {
  const now = new Date();
  document.getElementById('snapshotMonth').textContent =
    now.toLocaleString('en-IN', {month:'long', year:'numeric'});
  document.getElementById('snapshotOverlay').classList.add('open');
}
function closeSnapshot() { document.getElementById('snapshotOverlay').classList.remove('open'); }
function confirmSnapshot() {
  const now = new Date();
  const month = now.toISOString().slice(0,7);
  const equity = (assets.find(a=>a.id==='equity')?.value)||0;
  const rsu = (assets.find(a=>a.id==='rsu')?.value)||0;
  const unlisted = ((assets.find(a=>a.id==='unlisted')?.value)||0) + ((assets.find(a=>a.id==='crowdcube')?.value)||0);
  const gold = (assets.find(a=>a.id==='gold')?.value)||0;
  const ppf = (assets.find(a=>a.id==='ppf')?.value)||0;
  const pf = (assets.find(a=>a.id==='pf')?.value)||0;
  const retirement = ppf + pf;
  const total = getTotal();
  const entry = { month, total, equity, rsu, unlisted, gold, retirement, ppf, pf };
  const existing = history.findIndex(h => h.month === month);
  if (existing >= 0) history[existing] = entry; else history.push(entry);
  save('nw_history', history);
  closeSnapshot(); renderAll();
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'breakdown') renderBreakdownChart();
}

// ─── Keyboard / overlay close ─────────────────────────────────────────────────

['editOverlay','historyOverlay','snapshotOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) { if(e.target===this) this.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') ['editOverlay','historyOverlay','snapshotOverlay'].forEach(id => document.getElementById(id).classList.remove('open'));
  if (e.key === 'Enter' && document.getElementById('editOverlay').classList.contains('open')) saveEdit();
  if (e.key === 'Enter' && document.getElementById('historyOverlay').classList.contains('open')) saveHistoryEntry();
});

// ─── Init ─────────────────────────────────────────────────────────────────────

renderAll();
fetchGold();
</script>
</body>
</html>
